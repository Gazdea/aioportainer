name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event_name == 'release'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Check package
        run: pip install twine && twine check dist/*

      - name: Publish to PyPI
        run: |
          pip install twine
          python -c "
import os
os.makedirs(os.path.expanduser('~'), exist_ok=True)
with open(os.path.expanduser('~/.pypirc'), 'w') as f:
    f.write('''[distutils]
index-servers = pypi

[pypi]
username = __token__
password = ${{ secrets.PYPI_API_TOKEN }}
''')
"
          twine upload --repository pypi dist/*