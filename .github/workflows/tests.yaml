name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
        include:
          - python-version: "3.12"
            run-mypy: true
          - python-version: "3.9"
            run-mypy: false
          - python-version: "3.10"
            run-mypy: false
          - python-version: "3.11"
            run-mypy: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check portainer/

      - name: Run mypy
        if: matrix.run-mypy == true
        run: mypy portainer/ --ignore-missing-imports

      - name: Run tests
        run: pytest || true

      - name: Upload coverage
        if: matrix.run-mypy == true
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
